        </div>

      <div id="content" class="flex-1 overflow-y-auto p-6">
        <div class="flex items-center justify-center h-40"><div class="spinner"></div></div>
      </div>
    </main>
  </div>

// ── Fetch helper ─────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(`${API}${path}`, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) throw new Error(`API ${res.status}: ${await res.text()}`);
  return res.json();
}

// ── Navigation ───────────────────────────────────────────────────────────────
function navigate(view, customer = null) {
  currentView = view;
  currentCustomer = customer;
  render();
}

function setActiveNav(id) {
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.remove('bg-brand-100', 'text-brand-800', 'font-medium');
    b.classList.add('text-sidebar-foreground');
  });
  const el = document.getElementById(id);
  if (el) {
    el.classList.add('bg-brand-100', 'text-brand-800', 'font-medium');
    el.classList.remove('text-sidebar-foreground');
  }
}

// ── Render router ────────────────────────────────────────────────────────────
async function render() {
  const content = document.getElementById('content');
  const title = document.getElementById('page-title');

  content.innerHTML = '<div class="flex items-center justify-center h-40"><div class="spinner"></div></div>';

  try {
    if (currentView === 'overview') {
      title.textContent = 'Overview';
      setActiveNav('nav-overview');
      await renderOverview(content);
    } else if (currentView === 'customer') {
      const c = await api(`/customers/${currentCustomer}`);
      title.textContent = c.display_name || currentCustomer;
      setActiveNav(`nav-${currentCustomer}`);
      await renderCustomer(content, currentCustomer, c);
    }
  } catch (err) {
    content.innerHTML = `<div class="text-destructive bg-destructive/10 border border-destructive/20 rounded-xl p-6"><strong>Error:</strong> ${err.message}</div>`;
  }
}

async function switchTab(tab, key) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.remove('bg-brand-600', 'text-white');
    b.classList.add('text-secondary-foreground', 'hover:bg-muted');
  });
  const active = document.getElementById(`tab-${tab}`);
  if (active) {
    active.classList.add('bg-brand-600', 'text-white');
    active.classList.remove('text-secondary-foreground', 'hover:bg-muted');
  }
  await loadTab(tab, key);
}

async function loadTab(tab, key) {
  const el = document.getElementById('tab-content');
  el.innerHTML = '<div class="flex items-center justify-center h-32"><div class="spinner"></div></div>';

  try {
    switch (tab) {
      case 'profile': await renderProfile(el, key); break;
      case 'rules': await renderRules(el, key); break;
      case 'events': await renderEvents(el, key); break;
      case 'tasks': await renderTasks(el, key); break;
      case 'documents': await renderDocuments(el, key); break;
      case 'metrics': await renderMetrics(el, key); break;
      case 'ask': renderAskAgent(el, key); break;
    }
  } catch (err) {
    el.innerHTML = `<div class="text-destructive bg-destructive/10 border border-destructive/20 rounded-xl p-4">${err.message}</div>`;
  }
}

// ── Profile tab ──────────────────────────────────────────────────────────────

let _profileData = null;     // customer-facing profile cache
let _internalData = null;    // internal-only profile cache
let _profileEditing = false;

async function renderProfile(el, key) {
  // Fetch both profiles in parallel
  const [extData, intData] = await Promise.all([
    api(`/customers/${key}/profile`),
    api(`/customers/${key}/internal-profile`),
  ]);
  _profileData = extData;
  _internalData = intData;
  _profileEditing = false;

  const profile = extData.profile || {};
  const schema = extData.schema || [];
  const sections = extData.sections || [];

  const intProfile = intData.profile || {};
  const intSchema = intData.schema || [];
  const intSections = intData.sections || [];

  // Group schema fields by section
  const grouped = {};
  for (const s of sections) grouped[s.key] = [];
  for (const f of schema) {
    if (!grouped[f.section]) grouped[f.section] = [];
    grouped[f.section].push(f);
  }

  const intGrouped = {};
  for (const s of intSections) intGrouped[s.key] = [];
  for (const f of intSchema) {
    if (!intGrouped[f.section]) intGrouped[f.section] = [];
    intGrouped[f.section].push(f);
  }

  el.innerHTML = `
    <div class="space-y-4 fade-in">
      <div class="flex items-center justify-between">
        <h3 class="font-semibold text-foreground">Customer Profile</h3>
        <div class="flex gap-2">
          <span id="profile-save-status" class="text-xs text-muted-foreground"></span>
          <button id="profile-edit-btn" onclick="toggleProfileEdit('${key}')"
            class="px-3 py-1.5 text-xs font-medium rounded-lg border border-input text-secondary-foreground hover:bg-muted transition-colors inline-flex items-center gap-1">
            ${icon('pencil', 'w-3.5 h-3.5')} Edit
          </button>
          <button id="profile-save-btn" onclick="saveProfile('${key}')"
            class="hidden px-3 py-1.5 text-xs font-medium rounded-lg bg-brand-600 text-white hover:bg-brand-700 transition-colors inline-flex items-center gap-1">
            ${icon('arrow-down-tray', 'w-3.5 h-3.5')} Save Changes
          </button>
          <button id="profile-cancel-btn" onclick="renderProfile(document.getElementById('tab-content'), '${key}')"
            class="hidden px-3 py-1.5 text-xs font-medium rounded-lg border border-input text-secondary-foreground hover:bg-muted transition-colors">
            Cancel
          </button>
        </div>
      </div>

      <!-- Customer-facing sections -->
      ${sections.map(sec => {
        if (sec.key === 'custom') return renderCustomSection(profile, sec, 'ext');
        if (sec.key === 'contacts') return renderContactsSection(profile, schema, sec, key);
        const fields = grouped[sec.key] || [];
        if (fields.length === 0) return '';
        return renderProfileSection(sec, fields, profile, false);
      }).join('')}

      <!-- Internal-only divider -->
      <div class="flex items-center gap-3 pt-2">
        <div class="flex-1 h-px bg-destructive-200"></div>
        <div class="flex items-center gap-1.5 px-3 py-1 bg-destructive-50 border border-destructive-200 rounded-full">
          <svg class="w-3.5 h-3.5 text-destructive-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          <span class="text-xs font-bold text-destructive-600 tracking-wide uppercase">Internal Only — Not visible to AI agent or customer</span>
        </div>
        <div class="flex-1 h-px bg-destructive-200"></div>
      </div>

      <!-- Internal-only sections -->
      ${intSections.map(sec => {
        if (sec.key === 'custom') return renderCustomSection(intProfile, sec, 'int');
        const fields = intGrouped[sec.key] || [];
        if (fields.length === 0) return '';
        return renderProfileSection(sec, fields, intProfile, true);
      }).join('')}
    </div>`;
}

function renderProfileSection(sec, fields, profile, isInternal) {
  const sectionIcons = {

function renderProfileField(field, profile, prefix) {
  const val = profile[field.field];
  const displayVal = formatProfileValue(val, field);
  const fieldId = `pf-${prefix}-${field.field}`;

  return `
    <div class="profile-field" data-field="${field.field}" data-profile-type="${prefix}">
      <label class="block text-[11px] font-semibold text-muted-foreground uppercase tracking-wider mb-1" for="${fieldId}">${escapeHtml(field.description)}</label>
      <!-- Read-only view -->
      <div class="profile-view text-sm text-foreground min-h-[28px] flex items-center">
        ${displayVal || '<span class="text-muted-foreground italic">—</span>'}
      </div>
      <!-- Edit input (hidden until edit mode) -->
      <div class="profile-edit hidden">
        ${renderProfileInput(field, val, fieldId, prefix)}
      </div>
    </div>`;
}

function renderProfileInput(field, val, fieldId, prefix) {
  const t = field.type;
  if (t === 'enum') {
    const opts = field.options || [];
    return `<select id="${fieldId}" data-field="${field.field}" data-profile-type="${prefix}" class="profile-input w-full border border-input rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-ring outline-none">
      <option value="">—</option>
      ${opts.map(o => `<option value="${escapeHtml(o)}" ${val === o ? 'selected' : ''}>${escapeHtml(o)}</option>`).join('')}
    </select>`;
  }
  if (t === 'text') {
    return `<textarea id="${fieldId}" data-field="${field.field}" data-profile-type="${prefix}" rows="3" class="profile-input w-full border border-input rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-ring outline-none resize-y">${escapeHtml(String(val || ''))}</textarea>`;
  }
  if (t === 'list') {
    const items = Array.isArray(val) ? val : [];
    return `<div class="space-y-1">
      <div id="${fieldId}-list" class="space-y-1">
        ${items.map((item, i) => `
          <div class="flex gap-1">
            <input type="text" value="${escapeHtml(String(item))}" data-field="${field.field}" data-profile-type="${prefix}" data-list-idx="${i}" class="profile-input profile-list-item flex-1 border border-input rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-ring outline-none" />
            <button onclick="removeListItem('${fieldId}', ${i})" class="px-1.5 text-destructive-400 hover:text-destructive-600">${icon('x-circle', 'w-4 h-4')}</button>
          </div>
        `).join('')}
      </div>
      <button onclick="addListItem('${fieldId}', '${field.field}', '${prefix}')" class="text-xs text-brand-600 hover:text-brand-800 font-medium">+ Add item</button>
    </div>`;
  }
  const inputType = t === 'int' || t === 'float' ? 'number' : t === 'date' ? 'date' : 'text';
  const step = t === 'float' ? 'step="0.01"' : '';
  return `<input type="${inputType}" ${step} id="${fieldId}" data-field="${field.field}" data-profile-type="${prefix}" value="${escapeHtml(String(val ?? ''))}" class="profile-input w-full border border-input rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-ring outline-none" />`;
}

function formatProfileValue(val, field) {
  if (val === null || val === undefined || val === '' || val === 0) {
    // Special: show 0 for scores
    if (field.type === 'int' && (field.field.includes('score') || field.field.includes('count') || field.field.includes('users'))) {
      return '<span class="text-muted-foreground">0</span>';
    }
    return '';
  }
  if (field.type === 'list' && Array.isArray(val)) {
    if (val.length === 0) return '';
    return val.map(v => `<span class="inline-block bg-brand-50 text-brand-700 text-xs px-2 py-0.5 rounded-full mr-1 mb-0.5">${escapeHtml(String(v))}</span>`).join('');
  }
  if (field.type === 'enum') {
    const colors = {
      low: 'bg-success-100 text-success-700',
      medium: 'bg-warning-100 text-warning-700',
      high: 'bg-destructive-100 text-destructive-700',
      onboarding: 'bg-informative-100 text-informative-700',
      pilot: 'bg-accent text-accent-foreground',
      scaling: 'bg-warning-100 text-warning-700',
      mature: 'bg-success-100 text-success-700',
      starter: 'bg-muted text-foreground',
      growth: 'bg-informative-100 text-informative-700',
      enterprise: 'bg-brand-100 text-brand-800',
    };
    const cls = colors[val] || 'bg-muted text-foreground';
    return `<span class="text-xs font-semibold px-2 py-0.5 rounded-full ${cls}">${escapeHtml(String(val))}</span>`;
  }
  if (field.type === 'float' && field.field === 'arr') {
    return `$${Number(val).toLocaleString()}`;
  }
  if (field.type === 'int' && field.field === 'credit_limit') {
    return Number(val).toLocaleString();
  }
  if (field.type === 'int' && field.field === 'health_score') {
    const score = Number(val);
    const color = score >= 70 ? 'text-success-600' : score >= 40 ? 'text-warning-600' : 'text-destructive-600';
    return `<span class="font-bold ${color}">${score}</span><span class="text-muted-foreground text-xs"> / 100</span>`;
  }
  return escapeHtml(String(val));
}

        <div class="flex items-center gap-2">
          <span class="text-brand-500">${contactsIcon}</span>
          <span class="text-sm font-semibold text-foreground">${escapeHtml(sec.label)}</span>

        </div>

      <div id="profile-section-${secId}" class="border-t border-border">

              </div>
              <!-- Rows -->
              ${contacts.map((row, idx) => `
                <div class="flex gap-2 items-center contacts-row" data-row-idx="${idx}">

                </div>
              `).join('')}

function addContactRow() {
  const container = document.getElementById('contacts-table-edit');
  if (!container) return;
  const columns = ['name', 'role', 'email', 'phone', 'notes'];
  const labels = ['Name', 'Role / Designation', 'Email', 'Phone', 'Notes'];
  const idx = container.querySelectorAll('.contacts-row').length;
  const div = document.createElement('div');
  div.className = 'flex gap-2 items-center contacts-row';
  div.dataset.rowIdx = idx;
  div.innerHTML = columns.map((c, i) =>
    `<input type="text" value="" data-col="${c}" class="contacts-input flex-1 border border-input rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-ring outline-none" placeholder="${labels[i]}" />`
  ).join('') + `<button onclick="this.closest('.contacts-row').remove()" class="w-8 flex items-center justify-center text-destructive-400 hover:text-destructive-600 shrink-0">${icon('x-circle', 'w-4 h-4')}</button>`;
  container.appendChild(div);
  div.querySelector('input').focus();
}

function _collectContactsUpdates() {
  const rows = document.querySelectorAll('.contacts-row');
  const contacts = [];
  rows.forEach(row => {
    const entry = {};
    let hasValue = false;
    row.querySelectorAll('.contacts-input').forEach(inp => {
      entry[inp.dataset.col] = inp.value.trim();
      if (inp.value.trim()) hasValue = true;
    });
    if (hasValue) contacts.push(entry);
  });
  return contacts;
}

function renderCustomSection(profile, sec, prefix) {
  const custom = profile.custom || {};
  const keys = Object.keys(custom);
  const isInternal = prefix === 'int';
  const secId = `${prefix}-custom`;
  const borderClass = isInternal ? 'border-l-4 border-l-destructive-400 border border-destructive-200' : 'border border-border';
  const bgClass = isInternal ? 'bg-destructive-50' : 'bg-card';
  const iconColor = isInternal ? 'text-destructive-500' : 'text-brand-500';

  return `
    <div class="${bgClass} rounded-xl ${borderClass} overflow-hidden" data-profile-type="${prefix}">
      <button onclick="toggleProfileSection('${secId}')" class="w-full px-4 py-3 flex items-center justify-between hover:bg-muted transition-colors">
        <div class="flex items-center gap-2">
          <span class="${iconColor}"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg></span>
          <span class="text-sm font-semibold text-foreground">${escapeHtml(sec.label)}</span>
          <span class="text-[10px] bg-muted text-muted-foreground px-1.5 py-0.5 rounded-full">${keys.length} fields</span>
          ${isInternal ? '<span class="text-[10px] bg-destructive-100 text-destructive-600 px-1.5 py-0.5 rounded-full font-bold flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>INTERNAL</span>' : ''}
        </div>
        <svg id="profile-chevron-${secId}" class="w-4 h-4 text-muted-foreground transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div id="profile-section-${secId}" class="border-t border-border">
        <div class="p-4 space-y-3">
          ${keys.length === 0 ? '<div class="text-sm text-muted-foreground italic">No custom fields yet</div>' : ''}
          ${keys.map(k => `
            <div class="flex items-center gap-3 profile-field" data-field="custom.${k}" data-profile-type="${prefix}">
              <label class="text-[11px] font-semibold text-muted-foreground uppercase tracking-wider w-36 shrink-0">${escapeHtml(k)}</label>
              <div class="profile-view text-sm text-foreground flex-1">${escapeHtml(String(custom[k]))}</div>
              <div class="profile-edit hidden flex-1">
                <input type="text" data-field="custom.${k}" data-profile-type="${prefix}" value="${escapeHtml(String(custom[k]))}" class="profile-input w-full border border-input rounded-lg px-2.5 py-1.5 text-sm focus:ring-2 focus:ring-ring outline-none" />
              </div>
            </div>
          `).join('')}
          <!-- Add custom field (only visible in edit mode) -->
          <div class="profile-edit hidden pt-2 border-t border-border">
            <div class="flex gap-2">
              <input type="text" id="${prefix}-custom-field-name" placeholder="Field name" class="flex-1 border border-input rounded-lg px-2.5 py-1.5 text-sm" />
              <input type="text" id="${prefix}-custom-field-value" placeholder="Value" class="flex-1 border border-input rounded-lg px-2.5 py-1.5 text-sm" />
              <button onclick="addCustomField('${prefix}')" class="px-3 py-1.5 bg-brand-600 text-white text-xs font-medium rounded-lg hover:bg-brand-700">+ Add</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}

function toggleProfileSection(sectionId) {
  const content = document.getElementById(`profile-section-${sectionId}`);
  const chevron = document.getElementById(`profile-chevron-${sectionId}`);
  if (!content) return;
  content.classList.toggle('hidden');
  chevron?.classList.toggle('rotate-180');
}

function toggleProfileEdit(key) {
  _profileEditing = !_profileEditing;
  const views = document.querySelectorAll('.profile-view');
  const edits = document.querySelectorAll('.profile-edit');
  const editBtn = document.getElementById('profile-edit-btn');
  const saveBtn = document.getElementById('profile-save-btn');
  const cancelBtn = document.getElementById('profile-cancel-btn');

  if (_profileEditing) {
    views.forEach(v => v.classList.add('hidden'));
    edits.forEach(e => e.classList.remove('hidden'));
    editBtn.classList.add('hidden');
    saveBtn.classList.remove('hidden');
    cancelBtn.classList.remove('hidden');
  } else {
    views.forEach(v => v.classList.remove('hidden'));
    edits.forEach(e => e.classList.add('hidden'));
    editBtn.classList.remove('hidden');
    saveBtn.classList.add('hidden');
    cancelBtn.classList.add('hidden');
  }
}

async function saveProfile(key) {
  // Collect updates for customer-facing profile (ext)
  const extUpdates = _collectUpdates('ext', _profileData);
  // Collect contacts table if in edit mode
  const contactsRows = document.querySelectorAll('.contacts-row');
  if (contactsRows.length > 0 || document.getElementById('contacts-table-edit')) {
    const newContacts = _collectContactsUpdates();
    const oldContacts = (_profileData?.profile?.contacts) || [];
    if (JSON.stringify(newContacts) !== JSON.stringify(oldContacts)) {
      extUpdates.contacts = newContacts;
    }
  }
  // Collect updates for internal-only profile (int)
  const intUpdates = _collectUpdates('int', _internalData);

  if (Object.keys(extUpdates).length === 0 && Object.keys(intUpdates).length === 0) {
    document.getElementById('profile-save-status').textContent = 'No changes';
    setTimeout(() => { document.getElementById('profile-save-status').textContent = ''; }, 2000);
    return;
  }

  const saveBtn = document.getElementById('profile-save-btn');
  saveBtn.textContent = 'Saving…';
  saveBtn.disabled = true;

  try {
    const promises = [];
    if (Object.keys(extUpdates).length > 0) {
      promises.push(api(`/customers/${key}/profile`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ updates: extUpdates }),
      }));
    }
    if (Object.keys(intUpdates).length > 0) {
      promises.push(api(`/customers/${key}/internal-profile`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ updates: intUpdates }),
      }));
    }
    await Promise.all(promises);

    document.getElementById('profile-save-status').innerHTML = icon('check-circle', 'w-3.5 h-3.5 text-success inline') + ' Saved';
    setTimeout(() => {
      document.getElementById('profile-save-status').textContent = '';
    }, 3000);
    // Reload both profiles
    await renderProfile(document.getElementById('tab-content'), key);
  } catch (err) {

function _collectUpdates(prefix, dataObj) {
  const updates = {};
  const profile = dataObj?.profile || {};
  const schema = dataObj?.schema || [];

  // Collect regular inputs
  document.querySelectorAll(`.profile-input[data-profile-type="${prefix}"]`).forEach(inp => {
    const field = inp.dataset.field;
    if (!field) return;
    if (inp.dataset.listIdx !== undefined) return;
    if (field.startsWith('custom.')) return;

    let val = inp.value;
    const sEntry = schema.find(s => s.field === field);
    if (sEntry) {
      if (sEntry.type === 'int') val = parseInt(val) || 0;
      else if (sEntry.type === 'float') val = parseFloat(val) || 0;
    }
    if (JSON.stringify(val) !== JSON.stringify(profile[field])) {
      updates[field] = val;
    }
  });

  // Collect list fields
  const listFields = {};
  document.querySelectorAll(`.profile-list-item[data-profile-type="${prefix}"]`).forEach(inp => {
    const field = inp.dataset.field;
    if (!listFields[field]) listFields[field] = [];
    if (inp.value.trim()) listFields[field].push(inp.value.trim());
  });
  for (const [field, items] of Object.entries(listFields)) {
    if (JSON.stringify(items) !== JSON.stringify(profile[field])) {
      updates[field] = items;
    }
  }

  // Collect custom field changes
  const customUpdates = {};
  document.querySelectorAll(`.profile-input[data-profile-type="${prefix}"][data-field^="custom."]`).forEach(inp => {
    const rawKey = inp.dataset.field.replace('custom.', '');
    const oldVal = (profile.custom || {})[rawKey];
    if (inp.value !== String(oldVal ?? '')) {
      customUpdates[rawKey] = inp.value;
    }
  });
  if (Object.keys(customUpdates).length > 0) {
    updates.custom = customUpdates;
  }

  return updates;
}

/** Build a human-readable details panel for an event. */
function renderEventDetails(details, eventType) {
  if (!details || Object.keys(details).length === 0) return '';

  const sections = [];

  // Conversation events: show inbound + outbound clearly
  if (eventType === 'SLACK_CONVERSATION' || eventType === 'EMAIL_CONVERSATION') {
    const inLabel = eventType === 'EMAIL_CONVERSATION' ? 'Inbound Email' : 'Inbound Message';
    const outLabel = 'Agent Response';
    const inbound = details.message || details.body || '';
    const outbound = details.response || '';
    if (details.subject) sections.push(`<div class="mb-2"><span class="text-[11px] font-semibold text-muted-foreground uppercase tracking-wide">Subject</span><div class="text-sm text-foreground mt-0.5">${escapeHtml(details.subject)}</div></div>`);
    if (details.to) sections.push(`<div class="mb-2"><span class="text-[11px] font-semibold text-muted-foreground uppercase tracking-wide">To</span><div class="text-sm text-foreground mt-0.5">${escapeHtml(typeof details.to === 'string' ? details.to : details.to.join(', '))}</div></div>`);
    if (details.channel) sections.push(`<div class="mb-2"><span class="text-[11px] font-semibold text-muted-foreground uppercase tracking-wide">Channel</span><div class="text-sm text-foreground mt-0.5">#${escapeHtml(details.channel)}</div></div>`);
    if (inbound) sections.push(`<div class="mb-2"><span class="text-[11px] font-semibold text-muted-foreground uppercase tracking-wide">${inLabel}</span><div class="text-sm text-secondary-foreground mt-1 whitespace-pre-wrap bg-muted rounded-lg p-3 max-h-40 overflow-y-auto">${escapeHtml(inbound)}</div></div>`);
    if (outbound) sections.push(`<div class="mb-2"><span class="text-[11px] font-semibold text-muted-foreground uppercase tracking-wide">${outLabel}</span><div class="text-sm text-secondary-foreground mt-1 whitespace-pre-wrap bg-muted rounded-lg p-3 max-h-40 overflow-y-auto">${escapeHtml(outbound)}</div></div>`);
    if (details.response_status) sections.push(`<div class="mb-2"><span class="text-[11px] font-semibold text-muted-foreground uppercase tracking-wide">Status</span><div class="text-sm text-foreground mt-0.5">${escapeHtml(details.response_status)}</div></div>`);
  }
  // Email sent/rejected events
  else if (eventType === 'EMAIL_RESPONSE_SENT' || eventType === 'EMAIL_RESPONSE_REJECTED') {
    if (details.to) sections.push(`<div class="mb-2"><span class="text-[11px] font-semibold text-muted-foreground uppercase tracking-wide">To</span><div class="text-sm text-foreground mt-0.5">${escapeHtml(Array.isArray(details.to) ? details.to.join(', ') : details.to)}</div></div>`);
    if (details.subject) sections.push(`<div class="mb-2"><span class="text-[11px] font-semibold text-muted-foreground uppercase tracking-wide">Subject</span><div class="text-sm text-foreground mt-0.5">${escapeHtml(details.subject)}</div></div>`);
    if (details.body) sections.push(`<div class="mb-2"><span class="text-[11px] font-semibold text-muted-foreground uppercase tracking-wide">Email Body</span><div class="text-sm text-secondary-foreground mt-1 whitespace-pre-wrap bg-muted rounded-lg p-3 max-h-40 overflow-y-auto">${escapeHtml(details.body)}</div></div>`);
    if (details.approved_by) sections.push(`<div class="mb-2"><span class="text-[11px] font-semibold text-muted-foreground uppercase tracking-wide">Approved By</span><div class="text-sm text-foreground mt-0.5">${escapeHtml(details.approved_by)}</div></div>`);
    if (details.rejected_by) sections.push(`<div class="mb-2"><span class="text-[11px] font-semibold text-muted-foreground uppercase tracking-wide">Rejected By</span><div class="text-sm text-foreground mt-0.5">${escapeHtml(details.rejected_by)}</div></div>`);
  }
  // Action approved/rejected events
  else if (eventType === 'ACTION_APPROVED' || eventType === 'ACTION_REJECTED') {
    if (details.tool_name) sections.push(`<div class="mb-2"><span class="text-[11px] font-semibold text-muted-foreground uppercase tracking-wide">Tool</span><div class="text-sm text-foreground mt-0.5">${escapeHtml(details.tool_name)}</div></div>`);
    if (details.tool_input) sections.push(`<div class="mb-2"><span class="text-[11px] font-semibold text-muted-foreground uppercase tracking-wide">Input</span><div class="text-sm text-secondary-foreground mt-1 whitespace-pre-wrap bg-muted rounded-lg p-3 max-h-40 overflow-y-auto font-mono text-xs">${escapeHtml(JSON.stringify(details.tool_input, null, 2))}</div></div>`);
    if (details.result) sections.push(`<div class="mb-2"><span class="text-[11px] font-semibold text-muted-foreground uppercase tracking-wide">Result</span><div class="text-sm text-secondary-foreground mt-1 whitespace-pre-wrap bg-muted rounded-lg p-3 max-h-40 overflow-y-auto">${escapeHtml(details.result)}</div></div>`);
    if (details.approved_by) sections.push(`<div class="mb-2"><span class="text-[11px] font-semibold text-muted-foreground uppercase tracking-wide">Approved By</span><div class="text-sm text-foreground mt-0.5">${escapeHtml(details.approved_by)}</div></div>`);
    if (details.rejected_by) sections.push(`<div class="mb-2"><span class="text-[11px] font-semibold text-muted-foreground uppercase tracking-wide">Rejected By</span><div class="text-sm text-foreground mt-0.5">${escapeHtml(details.rejected_by)}</div></div>`);
  }
  // Generic fallback: show all key-value pairs
  else {
    for (const [k, v] of Object.entries(details)) {
      if (v === null || v === undefined || v === '') continue;
      const val = typeof v === 'object' ? JSON.stringify(v, null, 2) : String(v);
      const isLong = val.length > 100;
      sections.push(`<div class="mb-2"><span class="text-[11px] font-semibold text-muted-foreground uppercase tracking-wide">${escapeHtml(k.replace(/_/g, ' '))}</span><div class="text-sm text-secondary-foreground mt-0.5 ${isLong ? 'whitespace-pre-wrap bg-muted rounded-lg p-3 max-h-40 overflow-y-auto' : ''}">${escapeHtml(val)}</div></div>`);
    }
  }

  if (sections.length === 0) return '';
  return `<div class="mt-2 pl-8 border-l-2 border-border ml-2">${sections.join('')}</div>`;
}

async function submitTask(key) {
  const schedType = document.getElementById('task-sched-type').value;
  const schedValue = document.getElementById('task-sched-value').value;
  const schedule = { type: schedType };
  if (schedType === 'once') schedule.at = schedValue;
  else if (schedType === 'recurring') schedule.every = schedValue;
  else schedule.cron = schedValue;

  const actionType = document.getElementById('task-action-type').value;
  const action = { type: actionType, channel: document.getElementById('task-channel').value };
  if (actionType === 'remind') action.message = document.getElementById('task-message').value;
  else if (actionType === 'run_prompt') action.prompt = document.getElementById('task-message').value;

  await api(`/customers/${key}/tasks`, {
    method: 'POST',
    body: JSON.stringify({
      description: document.getElementById('task-desc').value,
      schedule, action, tags: [],
    }),
  });
  await loadTab('tasks', key);
}

async function cancelTask(key, taskId) {
  if (!confirm('Cancel this task?')) return;
  await api(`/customers/${key}/tasks/${taskId}`, { method: 'DELETE' });
  await loadTab('tasks', key);
}

// ── Upload helpers ──────────────────────────────────────────────────────────

function handleFileDrop(event, customerKey) {
  const files = event.dataTransfer.files;
  if (files.length) uploadFiles(Array.from(files), customerKey);
}

function handleFileSelect(event, customerKey) {
  const files = event.target.files;
  if (files.length) uploadFiles(Array.from(files), customerKey);
  event.target.value = '';  // reset so same file can be re-selected
}

async function uploadFiles(files, customerKey) {
  const progressEl = document.getElementById('upload-progress');
  if (!progressEl) return;
  progressEl.classList.remove('hidden');
  progressEl.innerHTML = '';

  // Build a progress card per file
  const items = files.map((f, i) => {
    const id = `upload-item-${i}`;
    progressEl.insertAdjacentHTML('beforeend', `
      <div id="${id}" class="bg-card rounded-lg border border-border p-3 flex items-center gap-3">
        <div class="shrink-0 w-8 h-8 rounded-lg bg-muted flex items-center justify-center">
          <svg class="w-4 h-4 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium text-foreground truncate">${escapeHtml(f.name)}</div>
          <div class="text-xs text-muted-foreground" id="${id}-status">Uploading…</div>
        </div>
        <div id="${id}-icon" class="shrink-0">
          <div class="spinner w-5 h-5"></div>
        </div>
      </div>
    `);
    return { file: f, id };
  });

  // Upload sequentially to avoid overwhelming the server during ingestion
  for (const { file, id } of items) {
    const statusEl = document.getElementById(`${id}-status`);
    const iconEl = document.getElementById(`${id}-icon`);
    const cardEl = document.getElementById(id);
    try {
      const formData = new FormData();
      formData.append('file', file);
      const resp = await fetch(`/api/customers/${customerKey}/upload`, {
        method: 'POST',
        body: formData,
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || 'Upload failed');
      }
      const result = await resp.json();
      statusEl.textContent = result.message || 'Upload accepted';
      statusEl.classList.replace('text-muted-foreground', 'text-success-600');
      iconEl.innerHTML = '<svg class="w-5 h-5 text-success-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
      cardEl.classList.replace('border-border', 'border-success-200');
    } catch (err) {
      statusEl.textContent = `Failed: ${err.message}`;
      statusEl.classList.replace('text-muted-foreground', 'text-destructive-500');
      iconEl.innerHTML = '<svg class="w-5 h-5 text-destructive-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>';
      cardEl.classList.replace('border-border', 'border-destructive-200');
    }
  }

  // After all uploads complete, refresh the document list after a short delay
  setTimeout(async () => {
    const el = document.getElementById('tab-content');
    if (el && currentTab === 'documents') {
      await renderDocuments(el, customerKey);
    }
  }, 1500);
}

function toggleDocPreview(idx) {
  const preview = document.getElementById(`doc-preview-${idx}`);
  const chevron = document.getElementById(`doc-chevron-${idx}`);
  if (!preview) return;
  const isOpen = !preview.classList.contains('hidden');
  // Close all previews first
  document.querySelectorAll('[id^="doc-preview-"]').forEach(el => el.classList.add('hidden'));
  document.querySelectorAll('[id^="doc-chevron-"]').forEach(el => el.classList.remove('rotate-180'));
  if (!isOpen) {
    preview.classList.remove('hidden');
    chevron?.classList.add('rotate-180');
  }
}

function renderDocOverlay(doc, docIdx, query, customerKey) {

  let pageContents = [];
  if (pageMap.length > 0 && doc.content) {
    for (const pm of pageMap) {
      pageContents.push({
        page: pm.page,
        text: doc.content.substring(pm.char_start, pm.char_end),
        imageUrl: (doc.page_images || [])[pm.page - 1] || null,
      });
    }
  } else if (doc.content) {
    pageContents = [{ page: 1, text: doc.content, imageUrl: null }];
  }

  return `
    <div class="bg-card rounded-xl border border-border overflow-hidden" id="search-doc-${docIdx}">
      <!-- Document header (sticky) -->
      <div class="px-4 py-3 border-b border-border bg-muted sticky top-0 z-10 flex items-center justify-between">

            Toggle page images
          </button>` : ''}

function togglePageImages(docIdx) {
  const panels = document.querySelectorAll(`.page-img-panel[data-doc="${docIdx}"]`);
  panels.forEach(p => p.classList.toggle('hidden'));
}

function highlightAllMatches(query) {
  if (!query) return;
  const zones = document.querySelectorAll('.doc-highlight-zone');
  let globalIdx = 0;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(escaped, 'gi');

  zones.forEach(zone => {
    // Walk text nodes and wrap matches
    const walker = document.createTreeWalker(zone, NodeFilter.SHOW_TEXT, null);
    const textNodes = [];
    while (walker.nextNode()) textNodes.push(walker.currentNode);

    for (const node of textNodes) {
      const text = node.nodeValue;
      if (!re.test(text)) continue;
      re.lastIndex = 0;

      const frag = document.createDocumentFragment();
      let lastIdx = 0;
      let match;

      while ((match = re.exec(text)) !== null) {
        // Text before the match
        if (match.index > lastIdx) {
          frag.appendChild(document.createTextNode(text.substring(lastIdx, match.index)));
        }
        // The match itself
        const mark = document.createElement('mark');
        mark.className = 'search-match bg-warning-200 text-warning-900 rounded-sm px-0.5';
        mark.id = `search-match-${globalIdx}`;
        mark.dataset.matchIdx = globalIdx;
        mark.textContent = match[0];
        frag.appendChild(mark);
        globalIdx++;
        lastIdx = re.lastIndex;
      }

      // Remaining text
      if (lastIdx < text.length) {
        frag.appendChild(document.createTextNode(text.substring(lastIdx)));
      }

      node.parentNode.replaceChild(frag, node);
    }
  });

  _searchMatchState = { query, currentIdx: -1, totalMatches: globalIdx };
  const counter = document.getElementById('match-counter');
  if (counter) counter.textContent = `0 / ${globalIdx}`;

  // Jump to first match
  if (globalIdx > 0) searchMatchNav(1);
}

function searchMatchNav(direction) {
  const st = _searchMatchState;
  if (st.totalMatches === 0) return;

  // Remove active highlight from current
  const prev = document.getElementById(`search-match-${st.currentIdx}`);
  if (prev) {
    prev.classList.remove('bg-warning-400', 'text-warning-900', 'font-bold', 'ring-2', 'ring-warning-500');
    prev.classList.add('bg-warning-200', 'text-warning-900');
  }

  // Move index
  st.currentIdx += direction;
  if (st.currentIdx >= st.totalMatches) st.currentIdx = 0;
  if (st.currentIdx < 0) st.currentIdx = st.totalMatches - 1;

  // Apply active highlight
  const curr = document.getElementById(`search-match-${st.currentIdx}`);
  if (curr) {
    curr.classList.remove('bg-warning-200', 'text-warning-900');
    curr.classList.add('bg-warning-400', 'text-warning-900', 'font-bold', 'ring-2', 'ring-warning-500');
    // Scroll within the scrollable doc-overlay-body container
    const container = curr.closest('.doc-overlay-body');
    if (container) {
      const containerRect = container.getBoundingClientRect();
      const markRect = curr.getBoundingClientRect();
      const scrollTop = container.scrollTop + (markRect.top - containerRect.top) - containerRect.height / 2;
      container.scrollTo({ top: scrollTop, behavior: 'smooth' });
    }
    // Also ensure the document card is visible in the viewport
    const docCard = curr.closest('[id^="search-doc-"]');
    if (docCard) {
      const cardRect = docCard.getBoundingClientRect();
      if (cardRect.top < 0 || cardRect.bottom > window.innerHeight) {
        docCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }
  }

  // Update counter
  const counter = document.getElementById('match-counter');
  if (counter) counter.textContent = `${st.currentIdx + 1} / ${st.totalMatches}`;
}

function fileIconBg(mime) {
  if (!mime) return 'bg-muted';
  if (mime.includes('pdf')) return 'bg-destructive-100';
  if (mime.includes('word') || mime.includes('docx')) return 'bg-informative-100';
  if (mime.includes('presentation') || mime.includes('pptx')) return 'bg-warning-100';
  if (mime.includes('spreadsheet') || mime.includes('xlsx') || mime.includes('csv')) return 'bg-success-100';
  if (mime.includes('image')) return 'bg-accent';
  if (mime.includes('text') || mime.includes('markdown')) return 'bg-muted';
  return 'bg-muted';
}

function fileIconSvg(mime) {
  const color = (mime || '').includes('pdf') ? 'text-destructive-600'
    : (mime || '').includes('word') ? 'text-informative-600'
    : (mime || '').includes('presentation') ? 'text-warning-600'
    : (mime || '').includes('spreadsheet') ? 'text-success-600'
    : (mime || '').includes('image') ? 'text-accent-foreground'
    : 'text-muted-foreground';

  if ((mime || '').includes('pdf')) {
    return `<svg class="w-5 h-5 ${color}" viewBox="0 0 24 24" fill="currentColor"><path d="M7 18H17V16H7V18M17 14H7V12H17V14M7 10H11V8H7V10M15 4H5V20H19V8L15 4M15 9V5L18 9H15Z" /></svg>`;
  }
  if ((mime || '').includes('image')) {
    return `<svg class="w-5 h-5 ${color}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>`;
  }
  return `<svg class="w-5 h-5 ${color}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>`;
}

function sourceIcon(source) {
  if (source === 'slack') return icon('chat-bubble', 'w-3.5 h-3.5 text-brand-500');
  if (source === 'email') return icon('envelope', 'w-3.5 h-3.5 text-brand-500');
  if (source === 'upload') return icon('document-arrow-down', 'w-3.5 h-3.5 text-brand-500');
  return icon('document-text', 'w-3.5 h-3.5 text-muted-foreground');
}

function mimeLabel(mime) {
  if (!mime) return 'Unknown';
  if (mime.includes('pdf')) return 'PDF';
  if (mime.includes('word') || mime.includes('docx')) return 'Word';
  if (mime.includes('presentation') || mime.includes('pptx')) return 'PowerPoint';
  if (mime.includes('spreadsheet') || mime.includes('xlsx')) return 'Excel';
  if (mime.includes('csv')) return 'CSV';
  if (mime.includes('image/png')) return 'PNG';
  if (mime.includes('image/jpeg') || mime.includes('image/jpg')) return 'JPEG';
  if (mime.includes('image')) return 'Image';
  if (mime.includes('text/plain')) return 'Text';
  if (mime.includes('text/markdown')) return 'Markdown';
  return mime.split('/').pop() || 'File';
}

function metricBox(label, value) {
  return `
    <div class="bg-muted rounded-lg p-3">
      <div class="text-[11px] font-medium text-muted-foreground uppercase">${label}</div>
      <div class="text-lg font-semibold text-foreground mt-0.5">${value}</div>
    </div>`;
}

function timeAgo(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
  return d.toLocaleDateString();
}

function escapeHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

}

let _backfillPollers = {};  // customer_key → interval ID

async function startSlackBackfill(key) {
  const btn = document.getElementById(`backfill-btn-${key}`);
  const status = document.getElementById(`backfill-status-${key}`);
  if (!btn || !status) return;

  // Confirm
  if (!confirm(`This will import the entire Slack channel history for this customer into the knowledge base.\n\nConversations and shared files will be indexed. Already-imported items will be skipped.\n\nContinue?`)) {
    return;
  }

  btn.disabled = true;
  btn.classList.add('opacity-50', 'cursor-not-allowed');
  status.classList.remove('hidden');
  status.textContent = 'Starting…';

  try {
    await api(`/customers/${key}/backfill-slack`, { method: 'POST' });
    // Start polling for progress
    pollBackfillProgress(key);
  } catch (err) {
    status.textContent = `Error: ${err.message.replace(/^API \d+:\s*/, '').replace(/^"/, '').replace(/"$/, '')}`;
    btn.disabled = false;
    btn.classList.remove('opacity-50', 'cursor-not-allowed');
  }
}

function pollBackfillProgress(key) {
  // Clear any existing poller
  if (_backfillPollers[key]) clearInterval(_backfillPollers[key]);

  const poll = async () => {
    const status = document.getElementById(`backfill-status-${key}`);
    const btn = document.getElementById(`backfill-btn-${key}`);
    if (!status) {
      clearInterval(_backfillPollers[key]);
      delete _backfillPollers[key];
      return;
    }

    try {
      const data = await api(`/customers/${key}/backfill-slack`);

      if (data.status === 'fetching') {
        status.textContent = 'Fetching Slack history…';
      } else if (data.status === 'processing') {
        const pct = data.total_messages > 0
          ? Math.round((data.processed / data.total_messages) * 100)
          : 0;
        status.textContent = `Processing: ${data.processed}/${data.total_messages} messages (${pct}%) · ${data.conversations_logged || 0} convos · ${data.files_ingested || 0} files`;
      } else if (data.status === 'complete') {
        status.innerHTML = `<span class="text-success">${icon('check-circle', 'w-3.5 h-3.5 inline')} Done: ${data.conversations_logged || 0} conversations, ${data.files_ingested || 0} files imported</span>`;
        if (btn) {
          btn.disabled = false;
          btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
        clearInterval(_backfillPollers[key]);
        delete _backfillPollers[key];
        return;
      } else if (data.status === 'error') {
        status.innerHTML = `<span class="text-destructive">${icon('exclamation-circle', 'w-3.5 h-3.5 inline')} Error: ${data.error || 'Unknown error'}</span>`;
        if (btn) {
          btn.disabled = false;
          btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
        clearInterval(_backfillPollers[key]);
        delete _backfillPollers[key];
        return;
      }
    } catch (err) {
      // Network error — keep polling
    }
  };

  poll(); // Immediate first check
  _backfillPollers[key] = setInterval(poll, 2000);
}

  const errorEl = document.getElementById('nc-error');
  const warningsEl = document.getElementById('nc-warnings');
  const submitBtn = document.getElementById('nc-submit');
  errorEl.classList.add('hidden');
  warningsEl.classList.add('hidden');

  const key = (document.getElementById('nc-key').value || '').trim().toLowerCase();
  const displayName = (document.getElementById('nc-display-name').value || '').trim();
  const email = (document.getElementById('nc-email').value || '').trim();

  if (!key || !displayName) {
    errorEl.textContent = 'Key and display name are required.';
    errorEl.classList.remove('hidden');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.innerHTML = '<div class="spinner-sm"></div> Creating…';

  try {
    const result = await api('/customers', {
      method: 'POST',
      body: JSON.stringify({
        key,
        display_name: displayName,
        primary_contact_email: email,
      }),
    });

    // Show warnings if any
    if (result.warnings && result.warnings.length > 0) {
      warningsEl.innerHTML = result.warnings.map(w =>
        `<div class="flex items-start gap-2 text-warning text-xs bg-warning/10 border border-warning/20 rounded-lg p-2.5 mb-2">
          ${icon('exclamation-triangle', 'w-4 h-4 shrink-0 mt-0.5')}
          <span>${w}</span>
        </div>`
      ).join('');
      warningsEl.classList.remove('hidden');

      // Show success with warnings — let user close manually
      submitBtn.innerHTML = `${icon('check-circle', 'w-4 h-4')} Created!`;
      submitBtn.disabled = true;

      // Refresh sidebar in the background
      await refreshSidebar();

      // Auto-close after 3s and navigate to the new customer
      setTimeout(() => {
        closeNewCustomerModal();
        navigate('customer', key);
      }, 3000);
    } else {
      // Clean success — close and navigate
      await refreshSidebar();
      closeNewCustomerModal();
      navigate('customer', key);
    }
  } catch (err) {
    errorEl.textContent = err.message.replace(/^API \d+:\s*/, '').replace(/^"/, '').replace(/"$/, '');
    errorEl.classList.remove('hidden');
    submitBtn.disabled = false;
    submitBtn.innerHTML = `${icon('user-plus', 'w-4 h-4')} Create Customer`;
  }
}

async function refreshSidebar() {
  try {
    const data = await api('/customers');
    customersCache = data.customers || [];
    const nav = document.getElementById('customer-nav');
    nav.innerHTML = customersCache.map(c => `
      <button onclick="navigate('customer', '${c.key}')" id="nav-${c.key}"
        class="nav-btn w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-sidebar-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground transition-colors">
        <span class="w-6 h-6 rounded-md bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center text-white text-[10px] font-bold shrink-0">
          ${(c.display_name || c.key).charAt(0).toUpperCase()}
        </span>
        <span class="truncate">${c.display_name || c.key}</span>
      </button>
    `).join('');
  } catch (err) {
    console.error('Failed to refresh sidebar:', err);
  }
}

// ── Keyboard shortcuts for match navigation ──────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (_searchMatchState.totalMatches === 0) return;
  // Don't capture keys when typing in inputs/textareas
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'Escape') { closeSearchResults(); return; }
  if (e.shiftKey && e.key === 'Enter') { e.preventDefault(); searchMatchNav(-1); return; }
  if (e.key === 'n' || e.key === 'Enter') { e.preventDefault(); searchMatchNav(1); return; }
  if (e.key === 'p' || e.key === 'N') { e.preventDefault(); searchMatchNav(-1); return; }
});
</script>
