# Supabase CLI config. Generated for the local dev stack.
# Reference: https://supabase.com/docs/guides/local-development/cli/config

project_id = "delivery-ops"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
# Catches outbound emails from Supabase Auth. Open at http://127.0.0.1:54324.
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:4001"
additional_redirect_urls = ["http://localhost:4001/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
# Magic-link sign-in: no confirmation step in dev (the link itself is the
# confirmation). Inbucket at localhost:54324 catches every outbound email.
enable_confirmations = false

# Google OAuth — enabled in dev only when GOOGLE_CLIENT_ID is set in your
# shell or .env. Without it, sign-in falls back to the email magic-link flow.
# In Supabase Cloud (production) this is configured via the dashboard, not
# this file.
[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"
skip_nonce_check = false

[edge_runtime]
enabled = true
policy = "oneshot"

[analytics]
enabled = false
